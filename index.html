<meta charset="UTF-8">

<title>RIGOR 库存管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:#0c0d12;color:#e5e7eb;max-width:540px;margin:0 auto;min-height:100vh;padding-bottom:68px;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
input,select,textarea,button{font-family:inherit;outline:none}
.bar{background:#111318ee;border-bottom:1px solid #1e2130;padding:12px 16px;position:sticky;top:0;z-index:20;backdrop-filter:blur(12px)}
.inp{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #2a2e3e;background:#181b24;color:#e5e7eb;font-size:13px}
.inp:focus{border-color:#6366f1}
.card{background:#151821;border:1px solid #1e2130;border-radius:12px;padding:12px;margin-bottom:8px}
.btn{padding:10px 20px;border-radius:8px;border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;width:100%}
.sm{padding:5px 12px;border-radius:6px;border:none;color:#fff;font-size:11px;font-weight:500;cursor:pointer}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;background:#111318ee;border-top:1px solid #1e2130;display:flex;z-index:30;backdrop-filter:blur(12px)}
.nav button{flex:1;padding:8px 0 6px;border:none;background:transparent;color:#4b5563;font-size:9px;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer}
.nav button.on{color:#818cf8}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px}
.item{padding:10px 8px;border-bottom:1px solid #13161e;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.item:active{background:#1a1d27}
.qcg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.qcb{padding:8px 4px;border-radius:8px;border:1px solid #2a2e3e;background:#111318;color:#6b7280;font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.qcb.on{border-color:#34d39940;background:#0d542b20;color:#34d399}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#1a1d27;border-radius:16px 16px 0 0;width:100%;max-width:540px;padding:20px;max-height:85vh;overflow-y:auto}
.path-box{background:#0d1117;border:1px solid #1e2130;border-radius:6px;padding:8px 10px;font-family:monospace;font-size:10px;color:#7dd3fc;word-break:break-all;margin:4px 0}
.copy-btn{background:#1e3a5f;border:1px solid #2563eb40;color:#60a5fa;padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer}
.form-row{margin-bottom:10px}
.form-label{font-size:11px;color:#6b7280;margin-bottom:3px}
.edit-btn{background:none;border:1px solid #2a2e3e;color:#9ca3af;padding:4px 10px;border-radius:6px;font-size:10px;cursor:pointer}
.edit-btn:hover{border-color:#6366f1;color:#818cf8}
.del-btn{background:none;border:1px solid #5c1a1a;color:#f87171;padding:4px 10px;border-radius:6px;font-size:10px;cursor:pointer}
</style>
</head>

function loadFromStorage(){

function exportData(){
  const data=JSON.stringify({items,logs:allLogs,pipe,lastSync:new Date().toLocaleString("zh-CN"),exportBy:"RIGOR库存系统"},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="RIGOR_库存数据_"+new Date().toISOString().slice(0,10)+".json";
  a.click();URL.revokeObjectURL(url);
}
function importData(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.items||!Array.isArray(d.items)){alert("文件格式不正确");return;}
        if(!confirm(`确认导入？将覆盖当前数据。\n文件包含 ${d.items.length} 条产品, ${(d.pipe||[]).length} 条研发项目\n导出时间: ${d.lastSync||"未知"}`))return;
        items=d.items;allLogs=d.logs||[];pipe=d.pipe||pipe;
        nextId=items.length?Math.max(...items.map(i=>i.id))+1:0;
        nextPipeId=pipe.length?Math.max(...pipe.map(p=>p.id))+1:1;
        saveState();render();
        alert("导入成功！共 "+items.length+" 条产品");
      }catch(err){alert("导入失败："+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

  const sn=items.filter(d=>d.t==="正常").length,sl=items.filter(d=>d.t==="低库存").length,so=items.filter(d=>d.t==="缺货").length,sr2=items.filter(d=>d.t==="研发中").length;
  let h=`<div style="padding:16px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:18px"><div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff">⬡</div><div><div style="font-size:17px;font-weight:700;color:#fff">RIGOR 库存 & 研发</div><div style="font-size:11px;color:#6b7280">${items.length} SKU · ${lastSync?`<span style="color:#34d399">已保存</span>`:""}</div></div></div>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">`;
  [{l:"正常",v:sn,c:"#34d399"},{l:"低库存",v:sl,c:"#fbbf24"},{l:"缺货",v:so,c:"#f87171"},{l:"研发中",v:sr2,c:"#c084fc"}].forEach(x=>{h+=`<div class="card" style="cursor:default;padding:10px"><div style="font-size:9px;color:#6b7280">${x.l}</div><div style="font-size:20px;font-weight:700;color:${x.c}">${x.v}</div></div>`;});
  h+=`</div>`;
  // Series FIRST
  h+=`<div style="font-size:13px;font-weight:600;color:#9ca3af;margin-bottom:8px">📦 产品系列</div>`;
  SERIES.forEach(sr=>{const cnt=items.filter(d=>sr.sub.includes(d.c)).length;const oo=items.filter(d=>sr.sub.includes(d.c)&&d.t==="缺货").length;
    h+=`<div class="card" style="padding:10px;cursor:pointer" onclick="setFilter('${sr.id}')"><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:8px;background:${sr.color}20;display:flex;align-items:center;justify-content:center;font-size:16px;color:${sr.color}">${sr.icon}</div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:#fff">${sr.name}</div><div style="font-size:10px;color:#6b7280">${sr.desc} · ${cnt}个</div></div>${oo?`<span class="tag" style="background:#5c1a1a;color:#f87171">${oo}缺</span>`:""}<span style="color:#4b5563">›</span></div></div>`;});
  // Pipeline SECOND
  h+=`<div style="font-size:13px;font-weight:600;color:#c084fc;margin:16px 0 8px">🔬 研发管线</div>`;
  pipe.filter(p=>p.st!=="已完成").slice(0,4).forEach(p=>{const s=gs(p.st);const pc=p.pr==="P0"?"#f87171":"#fbbf24";
    h+=`<div class="card" style="padding:10px;cursor:pointer" onclick="nav('pipe')"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;font-weight:700;color:${pc};padding:2px 6px;border-radius:4px;border:1px solid ${pc};flex-shrink:0">${p.pr}</span><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nm}</div></div><span class="tag" style="background:${s.b};color:${s.t}">${p.st}</span></div></div>`;
  });
  h+=`<button class="sm" style="width:100%;background:#1e2130;border:1px solid #2a2e3e;color:#818cf8;margin-bottom:16px" onclick="nav('pipe')">查看全部管线 →</button>`;
  // Recent logs
  if(allLogs.length){h+=`<div style="font-size:12px;font-weight:600;color:#9ca3af;margin:4px 0 6px">最近操作</div>`;allLogs.slice(-4).reverse().forEach(l=>{h+=`<div style="padding:5px 0;border-bottom:1px solid #151821;font-size:11px"><span style="color:${l.tp==="in"?"#34d399":"#f87171"}">${l.tp==="in"?"▲入":"▼出"}</span><span style="color:#9ca3af;margin-left:6px">${l.nm}</span><span style="color:#fff;margin-left:6px">×${l.qt}</span></div>`;});}
  h+=`</div>`;return h;
}

// ═══ LIST ═══
function rList(){
  const fl=getFiltered();
  let h=`<div class="bar"><input class="inp" placeholder="搜索粒径、型号、货号..." value="${srch}" oninput="srch=this.value;render()" style="margin-bottom:6px">`;
  h+=`<div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:4px"><button class="sm" onclick="serF='全部';render()" style="background:${serF==="全部"?"#6366f1":"#1e2130"};border:1px solid #2a2e3e;white-space:nowrap">全部</button>`;
  SERIES.forEach(s=>{h+=`<button class="sm" onclick="serF='${s.id}';render()" style="background:${serF===s.id?s.color:"#1e2130"};border:1px solid ${serF===s.id?s.color:"#2a2e3e"};white-space:nowrap">${s.name}</button>`;});
  h+=`</div><div style="display:flex;gap:4px;margin-top:5px;flex-wrap:wrap">`;
  ["全部","正常","低库存","缺货","研发中","待包装"].forEach(st=>{const g=gs(st==="全部"?"正常":st);h+=`<button onclick="stF='${st}';render()" style="font-size:10px;padding:2px 8px;border-radius:10px;border:none;background:${stF===st?g.b:"#1a1d27"};color:${stF===st?g.t:"#6b7280"};cursor:pointer">${st}</button>`;});
  h+=`</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px"><span style="font-size:10px;color:#4b5563">${fl.length} 条</span><button onclick="toggleDelMode()" style="font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid ${delMode?'#f87171':'#2a2e3e'};background:${delMode?'#5c1a1a':'transparent'};color:${delMode?'#f87171':'#6b7280'};cursor:pointer">${delMode?'✓ 完成':'🗑️ 管理'}</button></div></div>`;
  h+=`<div style="padding:0 8px">`;
  fl.forEach(d=>{const st=gs(d.t);const sr=fs(d.c);const qd=QC.filter(q=>d.qc[q.id]).length;
    h+=`<div class="item" onclick="${delMode?'':`selId=${d.id};V='detail';render()`}"><div style="width:5px;height:5px;border-radius:50%;background:${st.d};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap"><span style="font-size:13px;font-weight:600;color:#fff">${d.s||"—"}</span><span style="font-size:9px;color:${sr.color}">${d.c}</span>${d.f&&d.f!=="无"&&d.f!==""?`<span style="font-size:8px;padding:0 4px;border-radius:3px;background:#1e2130;color:#818cf8">${d.f}</span>`:""}</div><div style="font-size:10px;color:#4b5563">${d.m||""}${d.k?" · "+d.k:""}${qd?` <span style="color:${qd>=6?"#34d399":"#fbbf24"}">QC ${qd}/6</span>`:""}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:700;color:${st.t}">${d.n>0?d.n:"—"}</div><span class="tag" style="background:${st.b};color:${st.t}">${d.t}</span></div>${delMode?`<button onclick="event.stopPropagation();doDelete(${d.id})" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:16px;padding:4px 6px;flex-shrink:0">✕</button>`:""}</div>`;
  });
  if(!fl.length)h+=`<div style="text-align:center;padding:40px;color:#4b5563">无匹配产品</div>`;
  h+=`</div>`;return h;
}

// ═══ ADD / EDIT FORM ═══
function rAddEdit(d){
  const isEdit=!!d;
  const title=isEdit?"✏️ 编辑产品":"＋ 新增产品";
  const backView=isEdit?"detail":"list";
  const cats=getCats();
  let h=`<div style="padding:16px"><button onclick="V='${backView}';render()" style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;margin-bottom:10px">← 返回</button>`;
  h+=`<div style="font-size:17px;font-weight:700;color:${isEdit?"#fbbf24":"#818cf8"};margin-bottom:14px">${title}</div>`;
  // Category
  h+=`<div class="form-row"><div class="form-label">产品分类 *（可选已有或输入新分类）</div><select class="inp" id="fCat" onchange="if(this.value==='__new__')document.getElementById('fCatNew').style.display='block';else document.getElementById('fCatNew').style.display='none'"><option value="">请选择</option>`;
  cats.forEach(c=>{h+=`<option value="${c}"${d&&d.c===c?" selected":""}>${c}</option>`;});
  h+=`<option value="__new__">➕ 输入新分类...</option></select>`;
  h+=`<input class="inp" id="fCatNew" placeholder="输入新分类名称，如: PE微球" style="display:none;margin-top:6px"></div>`;
  // Fields
  const fields=[
    ["s","粒径/规格 *","如 100nm, 2mL, 4.6×50mm"],
    ["f","官能团/类型","如 羧基-COOH, 蛋白A, 无"],
    ["m","型号","如 PS01010CM"],
    ["k","货号","如 PS02N100NA"],
    ["b","发货批号","如 20260316"],
  ];
  fields.forEach(([key,label,ph])=>{
    h+=`<div class="form-row"><div class="form-label">${label}</div><input class="inp" id="f_${key}" value="${d?d[key]||"":""}" placeholder="${ph}"></div>`;
  });
  // Quantity
  h+=`<div class="form-row"><div class="form-label">库存数量</div><input class="inp" type="number" id="f_n" value="${d?d.n:0}"></div>`;
  // Status
  h+=`<div class="form-row"><div class="form-label">库存状态</div><select class="inp" id="f_t">`;
  getAllStatuses().forEach(s=>{h+=`<option value="${s}"${d&&d.t===s?" selected":""}>${s}</option>`;});
  h+=`</select></div>`;
  // Notes
  h+=`<div class="form-row"><div class="form-label">备注</div><textarea class="inp" id="f_o" rows="2" style="resize:vertical">${d?d.o||"":""}</textarea></div>`;

  if(isEdit){
    h+=`<div style="display:flex;gap:8px"><button class="btn" style="background:#f59e0b" onclick="doEdit(${d.id})">保存修改</button></div>`;
    h+=`<button class="del-btn" style="width:100%;margin-top:10px;padding:10px" onclick="doDelete(${d.id})">🗑️ 删除此产品</button>`;
  } else {
    h+=`<button class="btn" style="background:#6366f1" onclick="doAdd()">确认新增</button>`;
  }
  h+=`</div>`;return h;
}

function getFormData(){
  let cat=document.getElementById("fCat").value;
  if(cat==="__new__"){cat=document.getElementById("fCatNew").value.trim();}
  if(!cat)return null;
  const s=document.getElementById("f_s").value.trim();
  if(!s)return null;
  return{
    c:cat,
    s:s,
    f:document.getElementById("f_f").value.trim(),
    m:document.getElementById("f_m").value.trim(),
    k:document.getElementById("f_k").value.trim(),
    b:document.getElementById("f_b").value.trim(),
    n:parseInt(document.getElementById("f_n").value)||0,
    t:document.getElementById("f_t").value,
    o:document.getElementById("f_o").value.trim()
  };
}

function doAdd(){
  const data=getFormData();
  if(!data){alert("请填写产品分类和粒径/规格");return;}
  const newItem={id:nextId++,...data,q:String(data.n),qc:{},logs:[],att:[]};
  items.push(newItem);
  // Add to series if new category
  const sr=fs(data.c);
  if(!sr.sub.includes(data.c)){SERIES[0].sub.push(data.c);}// default to PolyRef
  selId=newItem.id;V="detail";render();
}

function doEdit(id){
  const data=getFormData();
  if(!data){alert("请填写产品分类和粒径/规格");return;}
  const d=items.find(i=>i.id===id);if(!d)return;
  Object.assign(d,data);d.q=String(data.n);
  if(!fs(data.c).sub.includes(data.c)){SERIES[0].sub.push(data.c);}
  V="detail";render();
}

function doDelete(id){
  if(!confirm("确定删除此产品？此操作不可撤销。"))return;
  items=items.filter(i=>i.id!==id);
  V="list";selId=null;render();
}

// ═══ DETAIL ═══
function rDetail(){
  const d=items.find(i=>i.id===selId);if(!d)return"";
  const st=gs(d.t);const sr=fs(d.c);const fp=makePath(d);
  let h=`<div style="padding:16px"><button onclick="V='list';render()" style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;margin-bottom:10px">← 返回列表</button>`;
  // Header
  h+=`<div class="card" style="display:flex;align-items:center;gap:12px;cursor:default"><div style="width:42px;height:42px;border-radius:10px;background:${sr.color}20;display:flex;align-items:center;justify-content:center;font-size:18px;color:${sr.color}">${sr.icon}</div><div style="flex:1"><div style="font-size:16px;font-weight:700;color:#fff">${d.s||"—"}</div><div style="font-size:11px;color:${sr.color}">${sr.name} · ${d.c}</div>${d.f&&d.f!=="无"?`<div style="font-size:10px;color:#818cf8">${d.f}</div>`:""}</div><div style="text-align:center"><div style="font-size:26px;font-weight:700;color:${st.t}">${d.n}</div><span class="tag" style="background:${st.b};color:${st.t}">${d.t}</span></div></div>`;
  // Info + edit button
  h+=`<div class="card" style="cursor:default"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:12px;font-weight:600;color:#9ca3af">产品信息</span><div style="display:flex;gap:6px"><button class="edit-btn" onclick="V='edit';render()">✏️ 编辑</button><button class="del-btn" onclick="doDelete(${d.id})">🗑️ 删除</button></div></div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:11px">`;
  [["型号",d.m],["货号",d.k],["批号",d.b],["库存原始",d.q||String(d.n)]].forEach(([l,v])=>{h+=`<div><span style="color:#6b7280">${l}：</span><span style="color:#e5e7eb">${v||"—"}</span></div>`;});
  h+=`</div>${d.o?`<div style="margin-top:6px;padding:5px 7px;border-radius:5px;background:#1a1d27;color:#fbbf24;font-size:10px">${d.o}</div>`:""}`;
  h+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1e2130"><div style="font-size:10px;color:#60a5fa;margin-bottom:4px">📁 ${fp}/</div><button class="copy-btn" onclick="copyPath('${fp}/')">复制路径</button></div></div>`;
  // In/Out buttons
  h+=`<div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn" style="background:#059669" onclick="startIO(${d.id},'in')">▲ 入库</button><button class="btn" style="background:#dc2626" onclick="startIO(${d.id},'out')">▼ 出库</button></div>`;
  // QC
  h+=`<div class="card" style="cursor:default"><div style="font-size:12px;font-weight:600;color:#c084fc;margin-bottom:8px">🧪 QC检测 (${d.b||"—"})</div><div class="qcg">`;
  QC.forEach(q=>{const on=d.qc[q.id];h+=`<button class="qcb${on?" on":""}" onclick="toggleQC(${d.id},'${q.id}')"><span style="font-size:14px">${on?"✓":q.i}</span><span>${q.l}</span></button>`;});
  h+=`</div></div>`;
  // Attachments
  h+=`<div class="card" style="cursor:default"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:600;color:#9ca3af">📎 附件</span><button class="sm" style="background:#2563eb" onclick="openAttach(${d.id})">+ 添加</button></div>`;
  if(!d.att||!d.att.length)h+=`<div style="font-size:11px;color:#4b5563;text-align:center;padding:10px">暂无附件</div>`;
  else d.att.forEach(a=>{const at=AT.find(t=>t.id===a.tp)||AT[8];const full=fp+"/"+at.dir+"/"+a.nm;
    h+=`<div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #1a1d27"><span style="font-size:14px">${at.i}</span><div style="flex:1;min-width:0"><div style="font-size:11px;color:#e5e7eb">${a.nm}</div><div style="font-size:9px;color:#7dd3fc;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${full}</div><div style="font-size:9px;color:#4b5563">${at.l} · ${a.dt} <button class="copy-btn" onclick="event.stopPropagation();copyPath('${full}')">复制</button></div></div><button onclick="delAtt(${d.id},${a.aid})" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:14px">✕</button></div>`;
  });
  h+=`</div>`;
  // Logs
  h+=`<div class="card" style="cursor:default"><div style="font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:6px">📋 出入库记录</div>`;
  if(!d.logs.length)h+=`<div style="font-size:11px;color:#4b5563;text-align:center;padding:8px">暂无</div>`;
  else d.logs.slice().reverse().forEach(l=>{h+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #1a1d27;font-size:11px"><span style="color:${l.tp==="in"?"#34d399":"#f87171"};font-weight:600">${l.tp==="in"?"▲入":"▼出"}</span><span style="color:#fff">×${l.qt}</span><span style="color:#4b5563">${l.pv}→${l.nx}</span>${l.bt?`<span style="color:#818cf8;font-size:9px">${l.bt}</span>`:""}<span style="color:#4b5563;margin-left:auto">${l.dt}</span></div>`;});
  h+=`</div></div>`;return h;
}

// ═══ IN/OUT ═══
function rInOut(){
  const d=items.find(i=>i.id===selId);if(!d)return"";const isIn=modal.tp==="in";const cl=isIn?"#059669":"#dc2626";
  let h=`<div style="padding:16px"><button onclick="V='detail';modal=null;render()" style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;margin-bottom:10px">← 返回</button>`;
  h+=`<div style="font-size:17px;font-weight:700;color:${cl};margin-bottom:14px">${isIn?"▲ 入库":"▼ 出库"}</div>`;
  h+=`<div class="card" style="cursor:default"><div style="font-size:13px;color:#fff">${d.s} · ${d.c}</div><div style="font-size:11px;color:#6b7280">当前: ${d.n}</div></div>`;
  h+=`<div class="form-row"><div class="form-label">数量 *</div><input class="inp" type="number" id="ioQty" placeholder="输入数量"></div>`;
  h+=`<div class="form-row"><div class="form-label">批号</div><input class="inp" id="ioBat" placeholder="如 20260316"></div>`;
  h+=`<div class="form-row"><div class="form-label">日期</div><input class="inp" type="date" id="ioDt" value="${new Date().toISOString().slice(0,10)}"></div>`;
  h+=`<div class="form-row"><div class="form-label">备注</div><textarea class="inp" id="ioNt" rows="2" style="resize:vertical"></textarea></div>`;
  h+=`<button class="btn" style="background:${cl}" onclick="doIO()">确认${isIn?"入库":"出库"}</button></div>`;
  return h;
}

function startIO(id,tp){selId=id;modal={tp};V="inout";render();}
function doIO(){
  const d=items.find(i=>i.id===selId);if(!d)return;
  const qt=parseInt(document.getElementById("ioQty").value);if(!qt||qt<=0)return alert("请输入数量");
  const bt=document.getElementById("ioBat").value,dt=document.getElementById("ioDt").value;
  const pv=d.n,nx=modal.tp==="in"?d.n+qt:Math.max(0,d.n-qt);
  d.n=nx;d.t=nx===0?"缺货":nx<=5?"低库存":"正常";
  if(modal.tp==="in"&&bt)d.b=bt;
  d.logs.push({tp:modal.tp,qt,bt,dt,pv,nx});
  allLogs.push({tp:modal.tp,qt,dt,nm:d.s+" "+d.c});
  modal=null;V="detail";render();
}

function toggleQC(id,qid){const d=items.find(i=>i.id===id);if(d){d.qc[qid]=!d.qc[qid];render();}}

function openAttach(id){
  const d=items.find(i=>i.id===id);if(!d)return;const fp=makePath(d);
  const ov=document.createElement("div");ov.className="overlay";ov.id="attOv";ov.onclick=e=>{if(e.target===ov)ov.remove();};
  const sku=d.k||d.m||"item",bat=d.b||"nobatch";
  let h=`<div class="modal"><div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:10px">添加附件</div>`;
  h+=`<div style="font-size:10px;color:#60a5fa;margin-bottom:8px">📁 ${fp}/</div>`;
  h+=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">`;
  AT.forEach((a,i)=>{h+=`<button class="sm attT" data-t="${a.id}" data-dir="${a.dir}" onclick="pickAT(this)" style="background:${i===0?"#6366f120":"#111318"};border:1px solid ${i===0?"#6366f1":"#2a2e3e"};color:${i===0?"#818cf8":"#9ca3af"}">${a.i} ${a.l}</button>`;});
  h+=`</div><div class="form-label">文件名</div><input class="inp" id="attNm" value="COA_${sku}_${bat}.pdf" oninput="updPrev()" style="margin-bottom:6px">`;
  h+=`<div class="path-box" id="attPrev">${fp}/COA/COA_${sku}_${bat}.pdf</div>`;
  h+=`<div style="font-size:10px;color:#9ca3af;margin:8px 0;padding:6px;background:#111318;border-radius:6px">将文件放入上述路径即可关联</div>`;
  h+=`<div style="display:flex;gap:8px"><button class="btn" style="background:#374151" onclick="document.getElementById('attOv').remove()">取消</button><button class="btn" style="background:#6366f1" onclick="addAtt(${id})">确认</button></div></div>`;
  ov.innerHTML=h;document.body.appendChild(ov);
  window._at={id:"coa",dir:"COA"};window._fp=fp;
}
function pickAT(btn){
  window._at={id:btn.dataset.t,dir:btn.dataset.dir};
  document.querySelectorAll(".attT").forEach(b=>{b.style.background="#111318";b.style.borderColor="#2a2e3e";b.style.color="#9ca3af";});
  btn.style.background="#6366f120";btn.style.borderColor="#6366f1";btn.style.color="#818cf8";
  const d=items.find(i=>i.id===selId);const sku=d.k||d.m||"item",bat=d.b||"nobatch";
  document.getElementById("attNm").value=`${window._at.dir}_${sku}_${bat}.pdf`;
  updPrev();
}
function updPrev(){document.getElementById("attPrev").textContent=window._fp+"/"+window._at.dir+"/"+document.getElementById("attNm").value;}
function addAtt(id){
  const nm=document.getElementById("attNm").value.trim();if(!nm)return;
  const d=items.find(i=>i.id===id);
  d.att.push({aid:Date.now(),tp:window._at.id,dir:window._at.dir,nm,dt:new Date().toISOString().slice(0,10)});
  document.getElementById("attOv").remove();render();
}
function delAtt(id,aid){const d=items.find(i=>i.id===id);d.att=d.att.filter(a=>a.aid!==aid);render();}

// ═══ PIPELINE ═══
let pipeEditId=null; // null=list, -1=new, else=editing id
let nextPipeId=pipe.length?Math.max(...pipe.map(p=>p.id))+1:1;

function rPipe(){
  if(pipeEditId!==null) return rPipeEdit();
  const tabs=[{id:"all",l:"全部"},{id:"P0",l:"🔴 P0"},{id:"P1",l:"🟠 P1"},{id:"Done",l:"✅ 完成"}];
  const fl=pipe.filter(p=>ptab==="all"||p.pr===ptab||(ptab==="Done"&&p.st==="已完成"));
  let h=`<div style="padding:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:17px;font-weight:700;color:#fff">🔬 研发管线</div><button class="sm" style="background:#6366f1" onclick="pipeEditId=-1;render()">＋ 新增项目</button></div>`;
  h+=`<div style="display:flex;gap:6px;margin-bottom:14px">`;
  tabs.forEach(t=>{h+=`<button class="sm" onclick="ptab='${t.id}';render()" style="background:${ptab===t.id?"#6366f1":"#1e2130"};border:1px solid ${ptab===t.id?"#6366f1":"#2a2e3e"}">${t.l}</button>`;});
  h+=`</div>`;
  if(!fl.length)h+=`<div style="text-align:center;padding:30px;color:#4b5563">无匹配项目</div>`;
  fl.forEach(p=>{const s=gs(p.st);const pc=p.pr==="P0"?"#f87171":p.pr==="P1"?"#fbbf24":"#34d399";
    h+=`<div class="card" style="cursor:default"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:10px;font-weight:700;color:${pc};padding:2px 6px;border-radius:4px;border:1px solid ${pc}">${p.pr}</span><span style="font-size:13px;font-weight:600;color:#fff;flex:1">${p.nm}</span><button class="sm" onclick="cyclePipe(${p.id})" style="background:${s.b};color:${s.t};border:1px solid ${s.t}40">${p.st}</button></div>`;
    h+=`<div style="font-size:11px;color:#9ca3af">${p.tg}</div>`;
    h+=`<div style="font-size:10px;color:#6b7280;margin-top:2px">${p.ph}</div>`;
    if(p.nt)h+=`<div style="font-size:10px;color:#fbbf24;margin-top:4px;padding:4px 6px;background:#1a1d27;border-radius:4px">${p.nt}</div>`;
    h+=`<div style="display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #1e2130"><button class="edit-btn" onclick="pipeEditId=${p.id};render()">✏️ 编辑</button><button class="del-btn" onclick="delPipe(${p.id})">🗑️ 删除</button></div>`;
    h+=`</div>`;
  });
  h+=`</div>`;return h;
}

function rPipeEdit(){
  const isNew=pipeEditId===-1;
  const p=isNew?null:pipe.find(x=>x.id===pipeEditId);
  const title=isNew?"＋ 新增研发项目":"✏️ 编辑研发项目";
  let h=`<div style="padding:16px"><button onclick="pipeEditId=null;render()" style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;margin-bottom:10px">← 返回管线</button>`;
  h+=`<div style="font-size:17px;font-weight:700;color:${isNew?"#818cf8":"#fbbf24"};margin-bottom:14px">${title}</div>`;
  // Form fields
  h+=`<div class="form-row"><div class="form-label">项目名称 *</div><input class="inp" id="pNm" value="${p?p.nm:""}" placeholder="如: PET纳米微球多规格攻关"></div>`;
  h+=`<div class="form-row"><div class="form-label">优先级 *</div><select class="inp" id="pPr"><option value="P0"${p&&p.pr==="P0"?" selected":""}>🔴 P0 猛攻</option><option value="P1"${p&&p.pr==="P1"?" selected":""}>🟠 P1 顺手</option><option value="Done"${p&&p.pr==="Done"?" selected":""}>✅ 已完成</option></select></div>`;
  h+=`<div class="form-row"><div class="form-label">阶段</div><input class="inp" id="pPh" value="${p?p.ph:""}" placeholder="如: Week 1-2"></div>`;
  h+=`<div class="form-row"><div class="form-label">状态</div><select class="inp" id="pSt"><option value="待启动"${p&&p.st==="待启动"?" selected":""}>待启动</option><option value="进行中"${p&&p.st==="进行中"?" selected":""}>进行中</option><option value="已完成"${p&&p.st==="已完成"?" selected":""}>已完成</option><option value="待包装"${p&&p.st==="待包装"?" selected":""}>待包装</option></select></div>`;
  h+=`<div class="form-row"><div class="form-label">目标描述</div><input class="inp" id="pTg" value="${p?p.tg:""}" placeholder="如: 300-500nm(PVP K90)+500-1μm(乳化法)"></div>`;
  h+=`<div class="form-row"><div class="form-label">备注</div><textarea class="inp" id="pNt" rows="2" style="resize:vertical" placeholder="可选备注">${p?p.nt||"":""}</textarea></div>`;
  if(isNew){
    h+=`<button class="btn" style="background:#6366f1" onclick="doAddPipe()">确认新增</button>`;
  } else {
    h+=`<button class="btn" style="background:#f59e0b" onclick="doEditPipe(${p.id})">保存修改</button>`;
  }
  h+=`</div>`;return h;
}

function getPipeForm(){
  const nm=document.getElementById("pNm").value.trim();
  if(!nm){alert("请填写项目名称");return null;}
  return{nm,pr:document.getElementById("pPr").value,ph:document.getElementById("pPh").value.trim(),st:document.getElementById("pSt").value,tg:document.getElementById("pTg").value.trim(),nt:document.getElementById("pNt").value.trim()};
}

function doAddPipe(){
  const d=getPipeForm();if(!d)return;
  pipe.push({id:nextPipeId++,...d});
  pipeEditId=null;render();
}

function doEditPipe(id){
  const d=getPipeForm();if(!d)return;
  const p=pipe.find(x=>x.id===id);if(!p)return;
  Object.assign(p,d);
  pipeEditId=null;render();
}

function delPipe(id){
  if(!confirm("确定删除此研发项目？"))return;
  pipe=pipe.filter(p=>p.id!==id);
  render();
}

function cyclePipe(pid){const p=pipe.find(x=>x.id===pid);if(!p)return;const c={"待启动":"进行中","进行中":"已完成","已完成":"待启动","待包装":"已完成"};p.st=c[p.st]||"进行中";render();}

// ═══ SYNC PAGE ═══
function rSync(){
  const dataSize=(JSON.stringify({items,logs:allLogs,pipe}).length/1024).toFixed(1);
  let h=`<div style="padding:16px"><div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:4px">☁ 数据同步</div>`;
  h+=`<div style="font-size:11px;color:#6b7280;margin-bottom:16px">多人协同 · 数据导入导出</div>`;

  // Status card
  h+=`<div class="card" style="cursor:default;border-color:#1e3a5f"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:600;color:#60a5fa">📊 数据概览</span><span style="font-size:10px;color:#4b5563">${dataSize} KB</span></div>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:11px;text-align:center">`;
  h+=`<div><div style="font-size:18px;font-weight:700;color:#fff">${items.length}</div><div style="color:#6b7280">产品</div></div>`;
  h+=`<div><div style="font-size:18px;font-weight:700;color:#fff">${pipe.length}</div><div style="color:#6b7280">研发项目</div></div>`;
  h+=`<div><div style="font-size:18px;font-weight:700;color:#fff">${allLogs.length}</div><div style="color:#6b7280">操作记录</div></div>`;
  h+=`</div>`;
  h+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1e2130;font-size:10px;color:#6b7280">上次保存: ${lastSync||"尚未保存"}</div></div>`;

  // Export
  h+=`<div class="card" style="cursor:default"><div style="font-size:13px;font-weight:600;color:#34d399;margin-bottom:8px">📤 导出数据</div>`;
  h+=`<div style="font-size:11px;color:#9ca3af;margin-bottom:10px">导出当前所有数据为 JSON 文件，发给同事导入即可同步</div>`;
  h+=`<button class="btn" style="background:#059669" onclick="exportData()">导出 JSON 文件</button></div>`;

  // Import
  h+=`<div class="card" style="cursor:default"><div style="font-size:13px;font-weight:600;color:#818cf8;margin-bottom:8px">📥 导入数据</div>`;
  h+=`<div style="font-size:11px;color:#9ca3af;margin-bottom:10px">从同事导出的 JSON 文件中导入，<span style="color:#f87171">将覆盖当前数据</span></div>`;
  h+=`<button class="btn" style="background:#6366f1" onclick="importData()">选择 JSON 文件导入</button></div>`;

  // Workflow guide
  h+=`<div class="card" style="cursor:default;border-color:#2a2e3e"><div style="font-size:13px;font-weight:600;color:#fbbf24;margin-bottom:8px">📋 两人协同工作流</div>`;
  h+=`<div style="font-size:11px;color:#9ca3af;line-height:1.8">`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:6px"><span style="color:#818cf8;font-weight:600;flex-shrink:0">Step 1</span><span>你和同事各自用浏览器打开这个 HTML 文件</span></div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:6px"><span style="color:#818cf8;font-weight:600;flex-shrink:0">Step 2</span><span>日常各自在本地做出入库、编辑等操作（数据自动保存在浏览器里，刷新不丢）</span></div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:6px"><span style="color:#818cf8;font-weight:600;flex-shrink:0">Step 3</span><span>需要同步时 → 操作方点「导出」→ 微信发 JSON 文件给对方 → 对方点「导入」</span></div>`;
  h+=`<div style="display:flex;gap:8px"><span style="color:#818cf8;font-weight:600;flex-shrink:0">建议</span><span>每天下班前导出一次最新数据，发到微信工作群或共享文件夹</span></div>`;
  h+=`</div></div>`;

  // Reset
  h+=`<div class="card" style="cursor:default;border-color:#5c1a1a"><div style="font-size:13px;font-weight:600;color:#f87171;margin-bottom:8px">⚠️ 重置数据</div>`;
  h+=`<div style="font-size:11px;color:#9ca3af;margin-bottom:10px">恢复到初始库存数据，所有修改都会丢失</div>`;
  h+=`<button class="btn" style="background:#dc2626" onclick="resetToDefault()">恢复初始数据</button></div>`;

  h+=`</div>`;return h;
}

render();
</script></body></html>
